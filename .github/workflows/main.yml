name: CI – tSQLt Unit Tests

on:
  push:
    branches: [master, development, Production]
  pull_request:
    branches: [master, development, Production]

jobs:
  test-sql:
    runs-on: ubuntu-latest

    services:
      sqlserver:
        image: mcr.microsoft.com/mssql/server:2022-latest
        env:
          ACCEPT_EULA: "Y"
          SA_PASSWORD: "Test@1234Pass!"
        ports:
          - 1433:1433
        options: >-
          --health-cmd "exit 0"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 30

    steps:
      - uses: actions/checkout@v3

      - name: Install SQL Server tools
        run: |
          # Add Microsoft GPG key correctly
          curl https://packages.microsoft.com/keys/microsoft.asc | sudo tee /etc/apt/trusted.gpg.d/microsoft.asc
          
          # Add the official repo (no conflicts)
          sudo sh -c 'echo "deb [arch=amd64] https://packages.microsoft.com/ubuntu/24.04/prod focal main" > /etc/apt/sources.list.d/mssql-release.list'

          sudo apt-get update
          sudo ACCEPT_EULA=Y apt-get install -y mssql-tools unixodbc-dev
          echo 'export PATH="$PATH:/opt/mssql-tools/bin"' >> $GITHUB_ENV
          source $GITHUB_ENV

      - name: Wait for SQL Server to start
        run: |
          echo "Waiting for SQL Server to start..."
          for i in {1..30}; do
            sqlcmd -S localhost -U SA -P "Test@1234Pass!" -Q "SELECT 1" > /dev/null 2>&1
            if [ $? -eq 0 ]; then
              echo "SQL Server is ready!"
              break
            fi
            echo "Waiting 10 seconds..."
            sleep 10
          done

      - name: Create test database if not exists
        run: |
          sqlcmd -S localhost -U SA -P "Test@1234Pass!" -Q "IF DB_ID('TestDB') IS NULL CREATE DATABASE TestDB;"

      - name: Run tSQLt tests
        run: |
          sqlcmd -S localhost -U SA -P "Test@1234Pass!" -d TestDB -Q "EXEC tSQLt.RunAll;"

      - name: Show test results
        run: echo "tSQLt tests finished!"
