name: CI – tSQLt Unit Tests

on:
  push:
    branches: [master, development, Production]
  pull_request:
    branches: [master, development, Production]

jobs:
  test-sql:
    runs-on: ubuntu-latest

    services:
      sqlserver:
        image: mcr.microsoft.com/mssql/server:2022-latest
        env:
          ACCEPT_EULA: "Y"
          SA_PASSWORD: "Test@1234Pass!"
        ports:
          - 1433:1433
        options: >-
          --health-cmd "exit 0"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 30

    steps:
      - uses: actions/checkout@v3

      - name: Install SQL Server tools
        run: |
          # Import Microsoft GPG key
          curl https://packages.microsoft.com/keys/microsoft.asc | gpg --dearmor > microsoft.gpg
          sudo mv microsoft.gpg /etc/apt/trusted.gpg.d/microsoft-prod.gpg

          # Add Microsoft repository manually
          echo "deb [arch=amd64,arm64,armhf signed-by=/etc/apt/trusted.gpg.d/microsoft-prod.gpg] https://packages.microsoft.com/ubuntu/24.04/prod noble main" | sudo tee /etc/apt/sources.list.d/mssql-release.list

          # Update and install tools
          sudo apt-get update
          sudo ACCEPT_EULA=Y apt-get install -y mssql-tools unixodbc-dev
          echo 'export PATH="$PATH:/opt/mssql-tools/bin"' >> $GITHUB_ENV

      - name: Wait for SQL Server to start
        run: |
          echo "Waiting for SQL Server to start..."
          for i in {1..30}; do
            sqlcmd -S localhost -U SA -P "Test@1234Pass!" -Q "SELECT 1" > /dev/null 2>&1
            if [ $? -eq 0 ]; then
              echo "SQL Server is ready!"
              break
            fi
            echo "Waiting 10 seconds..."
            sleep 10
          done

      - name: Run tSQLt tests
        run: |
          sqlcmd -S localhost -U SA -P "Test@1234Pass!" -d YourDatabaseName -Q "EXEC tSQLt.RunAll;"

      - name: Show test results
        run: echo "Tests finished!"
