name: .NET CI/CD Pipeline

on:
  push:
    branches:
      - Production
  pull_request:
    branches:
      - Production

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
    # 1. Checkout code
    - name: Checkout code
      uses: actions/checkout@v4

    # 2. Setup .NET
    - name: Setup .NET
      uses: actions/setup-dotnet@v4
      with:
        dotnet-version: '8.0.x'

    # 3. Restore (ONLY API project - SQL project skip)
    - name: Restore dependencies
      run: dotnet restore ServicePro.API/ServicePro.API.csproj

    # 4. Build
    - name: Build
      run: dotnet build ServicePro.API/ServicePro.API.csproj --configuration Release --no-restore

    # 5. Test
    - name: Test
      run: dotnet test ServicePro.API/ServicePro.API.csproj --no-build --verbosity normal

    # 6. Publish
    - name: Publish
      run: dotnet publish ServicePro.API/ServicePro.API.csproj -c Release -o publish

    # 7. Upload artifact
    - name: Upload artifact
      uses: actions/upload-artifact@v4
      with:
        name: api-build
        path: publish
